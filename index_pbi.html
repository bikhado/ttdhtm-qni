<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Crystal Clear - Power BI Mode</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-mode pbi-mode">
    <div class="dashboard-container">
        <header>
            <div class="header-top">
                <div class="brand">
                    <img src="Quoc_Huy_Viet_Nam_Chuan.png" alt="Logo" class="national-emblem">
                    <h1 class="brand-title">TRUNG TÂM GIÁM SÁT GIÁO DỤC</h1>
                    <div class="db-status" style="margin-left: 1rem;"><span class="dot"></span> LIVE MySQL</div>
                </div>
                <div class="header-top-right">
                    <div class="filter-item">
                        <label>Năm học:</label>
                        <select id="filter-year">
                            <option value="all">Tất cả</option>
                            <option value="2024-2025" selected>2024-2025</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="header-bottom">
                <div class="page-title">
                    <span class="grid-icon">⊞</span>
                    <h2>Dashboard Tối ưu Power BI</h2>
                </div>
                <div class="filter-group">
                    <div class="filter-item">
                        <label>Cấp học:</label>
                        <select id="filter-level">
                            <option value="all">Tất cả</option>
                            <option value="Tiểu học">Tiểu học</option>
                            <option value="THCS">THCS</option>
                            <option value="THPT">THPT</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label>Chuẩn:</label>
                        <select id="filter-standard">
                            <option value="all">Tất cả</option>
                            <option value="1">Đạt chuẩn</option>
                            <option value="0">Chưa đạt</option>
                        </select>
                    </div>
                </div>
            </div>
        </header>

        <section class="stats-grid" id="stats-cards">
            <div class="stat-card">
                <div class="icon">🏫</div>
                <div class="info">
                    <h3 id="stat-total-schools">0</h3>
                    <p>Tổng số trường</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="icon">👨‍🎓</div>
                <div class="info">
                    <h3 id="stat-total-students">0</h3>
                    <p>Tổng số học sinh</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="icon">👩‍🏫</div>
                <div class="info">
                    <h3 id="stat-total-teachers">0</h3>
                    <p>Tổng số giáo viên</p>
                </div>
            </div>
            <div class="stat-card highlight">
                <div class="icon">🏆</div>
                <div class="info">
                    <h3 id="stat-percent-standard">0%</h3>
                    <p>Trường đạt chuẩn</p>
                </div>
            </div>
        </section>

        <section class="charts-grid">
            <div class="chart-container wide-chart">
                <h3>Phân bổ Học sinh theo Khối lớp</h3>
                <div class="chart-height">
                    <canvas id="gradeDistributionChart"></canvas>
                </div>
            </div>
        </section>

        <section class="charts-grid secondary-charts">
            <div class="chart-container">
                <h3>Cơ cấu Nhân sự</h3>
                <canvas id="personnelChart"></canvas>
            </div>
            <div class="chart-container">
                <h3>Cơ sở vật chất</h3>
                <canvas id="facilityDetailChart"></canvas>
            </div>
        </section>

        <section class="table-section">
            <div class="table-header">
                <h3>Danh sách Chi tiết</h3>
                <input type="text" id="school-search" placeholder="Tìm kiếm...">
            </div>
            <div class="table-wrapper">
                <table id="school-table">
                    <thead>
                        <tr>
                            <th>Tên trường</th>
                            <th>Học sinh</th>
                            <th>Mật độ</th>
                            <th>GV/Lớp</th>
                            <th>Chuẩn</th>
                        </tr>
                    </thead>
                    <tbody id="school-table-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="app_db.js"></script>
</body>
</html>
